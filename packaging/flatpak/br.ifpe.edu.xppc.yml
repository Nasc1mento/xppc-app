id: br.ifpe.edu.xppc
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25
command: xppc
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=fallback-x11
  - --device=dri
  - --env=JAVA_HOME=/app/jre
  - --filesystem=xdg-documents
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - "/usr/lib/sdk/openjdk25/install.sh"
  - name: xppc
    buildsystem: simple
    build-commands:
      - install -Dm755 xppc.sh /app/bin/xppc
      - install -Dm644 xppc-1.0.0-all.jar /app/bin/xppc-1.0.0-all.jar
      - install -D br.ifpe.edu.xppc.desktop /app/share/applications/br.ifpe.edu.xppc.desktop
      - install -D br.ifpe.edu.xppc.svg /app/share/icons/hicolor/scalable/apps/br.ifpe.edu.xppc.svg
    sources:
      - type: file
        url: https://github.com/Nasc1mento/xppc-app/releases/download/v1.0.0/xppc-1.0.0-all.jar
        sha256: b1523c7570b8cc71b43974d70df3179dc5d3313fa90919bf8c557233bcbf9043
      - type: file
        path: xppc.sh
      - type: file
        path: br.ifpe.edu.xppc.desktop
      - type: file
        path: br.ifpe.edu.xppc.svg
