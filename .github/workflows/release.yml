name: release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v3

      - name: gradle build distribution
        run: ./gradlew clean distTar

      - name: version
        id: get_version
        shell: bash
        run: |
          VERSION=$(./gradlew -q xPPCVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: extract distribution tar
        shell: bash
        run: |
          mkdir -p build/jpackage-input
          tar -xf build/distributions/xppc-${{ env.APP_VERSION }}.tar -C build/jpackage-input --strip-components=1

      - name: jpackage exe
        shell: bash
        run: |
          jpackage --input build/jpackage-input/lib \
          --name "xppc" \
          --main-jar "xppc-${{ env.APP_VERSION }}.jar" \
          --main-class br.edu.ifpe.launcher.AppMain \
          --type exe \
          --win-dir-chooser \
          --win-shortcut \
          --dest dist

      - name: upload windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v3

      - name: gradle build distribution
        run: ./gradlew clean distTar

      - name: version
        id: get_version
        shell: bash
        run: |
          VERSION=$(./gradlew -q xPPCVersion)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: extract distribution tar
        shell: bash
        run: |
          mkdir -p build/jpackage-input
          tar -xf build/distributions/xppc-${{ env.APP_VERSION }}.tar -C build/jpackage-input --strip-components=1

      - name: jpackage macos app image
        shell: bash
        run: |
          jpackage --input build/jpackage-input/lib \
            --name "xppc" \
            --main-jar "xppc-${{ env.APP_VERSION }}.jar" \
            --main-class br.edu.ifpe.launcher.AppMain \
            --type app-image \
            --dest dist

      - name: jpackage dmg
        shell: bash
        run: |
          jpackage --input build/jpackage-input/lib \
          --name "xppc" \
          --main-jar "xppc-${{ env.APP_VERSION }}.jar" \
          --main-class br.edu.ifpe.launcher.AppMain \
          --type dmg \
          --dest dist

      - name: upload macos dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: dist/*.dmg

  release:
    needs: [ build-windows, build-macos ]
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-windows.outputs.app_version }}
        run: |
          gh release create "v$VERSION" \
            "artifacts/windows-installer/"* \
            "artifacts/macos-installer/"* \
            --title "xPPC v$VERSION" \
            --generate-notes