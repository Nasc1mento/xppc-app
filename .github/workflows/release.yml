name: release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v3

      - name: gradle build
        run: ./gradlew clean build

      - name: version
        id: get_version
        shell: bash
        run: |
          VERSION=$(./gradlew -q xPPCVersion)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: upload uberjar
        uses: actions/upload-artifact@v4
        with:
          name: uberjar
          path: build/libs/*-all.jar

      - name: jpackage windows app image
        shell: bash
        run: |
          jpackage --input build/libs \
            --name "xppc" \
            --main-jar "xppc-${{ env.APP_VERSION }}-all.jar" \
            --main-class br.edu.ifpe.launcher.AppMain \
            --type app-image \
            --dest dist

      - name: windows zip compress
        run: Compress-Archive -Path dist/xppc -DestinationPath "dist/xppc-windows-${{ env.APP_VERSION }}.zip"

      - name: upload windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip

      - name: jpackage exe
        shell: bash
        run: |
          jpackage --input build/libs \
          --name "xppc" \
          --main-jar "xppc-${{ env.APP_VERSION }}-all.jar" \
          --main-class br.edu.ifpe.launcher.AppMain \
          --type exe \
          --win-dir-chooser \
          --win-shortcut \
          --dest dist

      - name: upload windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  release:
    needs: [ build-windows ]
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-windows.outputs.app_version }}
        run: |
          gh release create "v$VERSION" \
            "artifacts/uberjar/"* \
            "artifacts/windows-installer/"* \
            "artifacts/windows-zip/"* \
            --title "xPPC v$VERSION" \
            --generate-notes