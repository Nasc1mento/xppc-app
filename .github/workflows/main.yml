name: Publicar Release Windows
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version: '
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v3

      - name: gradle build
        run: ./gradlew clean build

      - name: jpackage
        shell: bash
        run: |
          jpackage --input build/libs \
            --name "xppc" \
            --main-jar xppc-1.0.0-all.jar \
            --main-class br.ifpe.edu.AppMain \
            --type app-image \
            --dest dist

      - name: zip release
        run: Compress-Archive -Path dist/xppc -DestinationPath xppc-windows.zip

      - name: create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" xppc-windows.zip \
            --title "XPPC ${{ inputs.version }}" \