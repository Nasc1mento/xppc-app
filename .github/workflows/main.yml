name: release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v3

      - name: gradle build
        run: ./gradlew clean build

      - name: version
        id: get_version
        shell: bash
        run: |
          VERSION=$(./gradlew -q xPPCVersion)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: jpackage
        shell: bash
        run: |
          jpackage --input build/libs \
            --name "xppc" \
            --main-jar "xppc-${{ env.APP_VERSION }}-all.jar" \
            --main-class br.edu.ifpe.launcher.AppMain \
            --type app-image \
            --dest dist

      - name: windows zip compress
        run: Compress-Archive -Path dist/xppc -DestinationPath "xppc-windows-${{ env.APP_VERSION }}.zip"

      - name: Bundle Source Code
        shell: bash
        run: |
          git archive --format=zip --output="xppc-source-${{ env.APP_VERSION }}.zip" HEAD

      - name: Generate Hashes
        shell: bash
        run: |
          sha256sum "xppc-windows-${{ env.APP_VERSION }}.zip" > checksums.txt
          sha256sum "xppc-source-${{ env.APP_VERSION }}.zip" >> checksums.txt
          (cd build/libs && sha256sum "xppc-${{ env.APP_VERSION }}-all.jar") >> checksums.txt
          cat checksums.txt

      - name: create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.APP_VERSION }}" \
            "xppc-windows-${{ env.APP_VERSION }}.zip" \
            "xppc-source-${{ env.APP_VERSION }}.zip" \
            "build/libs/xppc-${{ env.APP_VERSION }}-all.jar" \
            "checksums.txt" \
            --title "XPPC ${{ env.APP_VERSION }}" \
            --generate-notes
